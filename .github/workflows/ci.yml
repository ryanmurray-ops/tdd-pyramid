name: CI Pipeline + Build + push to ECR

on:
    push:
        branches:
            - main

permissions: 
  id-token: write
  contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"
            
            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run tests
              run: pytest

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/tdd-pyramid-github-actions-role
                aws-region: eu-west-2
              
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build Docker Image
              run: |
                docker build -t tdd-pyramid .

            - name: Tag Image
              run: |
                docker tag tdd-pyramid:latest ${{ steps.login-ecr.outputs.registry }}/tdd-pyramid:latest
            
            - name: Push to ECR
              run: |
                docker push ${{ steps.login-ecr.outputs.registry }}/tdd-pyramid:latest

              
              



