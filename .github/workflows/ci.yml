name: CI Pipeline + Build + push to ECR

on:
    push:
        branches:
            - main
    workflow_dispatch:
  
permissions: 
  id-token: write
  contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"
            
            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Install Playwright browsers
              run: python -m playwright install --with-deps
            
            - name: Start flask app
              env:
                DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
                DATABASE_USER: ${{ secrets.DATABASE_USER }}
                DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
                DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
                DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
              run: |
                python app.py &
              
            - name: Wait for app to start
              run: sleep 5

            - name: Run tests
              run: pytest

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ryan-tdd-pyramid 
                aws-region: eu-west-2
            
            - name: Create ECR Repository if it doesn't exist
              run: |
                aws ecr describe-repositories --repository-names tdd-pyramid-ryan || \
                aws ecr create-repository --repository-name tdd-pyramid-ryan
              
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build Docker Image
              run: |
                docker build -t tdd-pyramid .

            - name: Tag Image
              run: |
                docker tag tdd-pyramid:latest ${{ steps.login-ecr.outputs.registry }}/tdd-pyramid-ryan:latest
            
            - name: Push to ECR
              run: |
                docker push ${{ steps.login-ecr.outputs.registry }}/tdd-pyramid-ryan:latest

              
              



